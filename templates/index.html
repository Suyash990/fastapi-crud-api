<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Modern Item & Task Management Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(30, 41, 59, 0.9);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-glow: 0 0 25px rgba(99, 102, 241, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding: 1rem 2rem;
        }

        .nav-container { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); font-weight: 800; font-size: 1.35rem; }
        .brand-icon { width: 40px; height: 40px; background: var(--accent-gradient); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: var(--shadow-glow); }
        .nav-actions { display: flex; align-items: center; gap: 1rem; }
        .status-badge { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); border: 1px solid rgba(16, 185, 129, 0.3); padding: 0.35rem 0.85rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .status-pulse { width: 8px; height: 8px; background: var(--accent-success); border-radius: 50%; box-shadow: 0 0 8px var(--accent-success); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .btn-docs { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.5rem 1rem; border-radius: var(--radius-md); font-size: 0.875rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .main-content { max-width: 1280px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
        .dashboard-header { margin-bottom: 2rem; }
        .dashboard-title { font-size: 2.25rem; font-weight: 800; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .dashboard-subtitle { color: var(--text-secondary); font-size: 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; display: flex; align-items: center; gap: 1.25rem; }
        .stat-icon { width: 54px; height: 54px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.35rem; }
        .stat-icon.purple { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .stat-icon.green { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .stat-icon.amber { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .stat-info .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--text-primary); }
        .stat-info .stat-label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
        .content-grid { display: grid; grid-template-columns: 360px 1fr; gap: 2rem; }
        @media (max-width: 992px) { .content-grid { grid-template-columns: 1fr; } }
        .card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.75rem; }
        .card-header { margin-bottom: 1.5rem; }
        .card-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .form-input, .form-textarea { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.75rem 1rem; color: var(--text-primary); outline: none; }
        .form-textarea { resize: vertical; min-height: 90px; }
        .form-checkbox { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
        .form-checkbox input { display: none; }
        .checkmark { width: 20px; height: 20px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .form-checkbox input:checked ~ .checkmark { background: var(--accent-primary); border-color: var(--accent-primary); }
        .checkmark i { color: white; font-size: 0.75rem; display: none; }
        .form-checkbox input:checked ~ .checkmark i { display: block; }
        .btn-submit { width: 100%; background: var(--accent-gradient); border: none; color: white; padding: 0.85rem; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .directory-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.25rem; }
        .filter-buttons { display: flex; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); padding: 4px; border-radius: var(--radius-md); }
        .filter-btn { background: transparent; border: none; color: var(--text-secondary); padding: 0.4rem 0.85rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .filter-btn.active { background: var(--accent-primary); color: white; }
        .search-box { position: relative; min-width: 240px; }
        .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.5rem 1rem 0.5rem 2.5rem; color: var(--text-primary); outline: none; }
        .items-list { display: flex; flex-direction: column; gap: 0.85rem; }
        .item-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.15rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .item-left { display: flex; align-items: flex-start; gap: 1rem; }
        .item-checkbox-btn { background: transparent; border: none; cursor: pointer; margin-top: 2px; }
        .item-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .item-title.completed { text-decoration: line-through; color: var(--text-muted); }
        .item-desc { font-size: 0.875rem; color: var(--text-secondary); }
        .item-actions { display: flex; align-items: center; gap: 0.5rem; }
        .btn-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-icon.delete:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: var(--accent-danger); }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-left: 4px solid var(--accent-primary); color: var(--text-primary); padding: 1rem 1.25rem; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand">
                <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
                <span>TaskFlow Portal</span>
            </a>
            <div class="nav-actions">
                <div class="status-badge">
                    <span class="status-pulse"></span>
                    <span>API Online</span>
                </div>
                <a href="/docs" target="_blank" class="btn-docs">
                    <i class="fa-solid fa-code"></i>
                    <span>Swagger Docs</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Item & Task Management</h1>
            <p class="dashboard-subtitle">Track, organize, and manage your records effortlessly via FastAPI REST service.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fa-solid fa-list-check"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amber"><i class="fa-solid fa-clock"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title" id="form-title-text">
                        <i class="fa-solid fa-plus-circle" style="color: var(--accent-primary)"></i>
                        <span>Add New Item</span>
                    </h2>
                </div>
                <form id="item-form">
                    <input type="hidden" id="item-id" value="">
                    <div class="form-group">
                        <label class="form-label" for="input-title">Item Title *</label>
                        <input type="text" id="input-title" class="form-input" placeholder="e.g. Complete FastAPI setup" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="input-desc">Description</label>
                        <textarea id="input-desc" class="form-textarea" placeholder="Add additional details or notes..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox" id="input-completed">
                            <span class="checkmark"><i class="fa-solid fa-check"></i></span>
                            <span style="font-size: 0.9rem; font-weight: 500;">Mark as Completed</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-save">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span id="btn-save-text">Save Item</span>
                    </button>
                </form>
            </div>

            <div class="card">
                <div class="directory-header">
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
                        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
                        <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
                    </div>
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" class="search-input" placeholder="Search items..." oninput="renderItems()">
                    </div>
                </div>

                <div id="items-container" class="items-list"></div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script>
        let allItems = [];
        let currentFilter = 'all';

        async function fetchItems() {
            try {
                const res = await fetch('/items/');
                if (!res.ok) throw new Error('Failed to fetch items');
                allItems = await res.json();
                updateStats();
                renderItems();
            } catch (err) {
                showToast('Error loading items', 'danger');
            }
        }

        function updateStats() {
            const total = allItems.length;
            const completed = allItems.filter(i => i.completed).length;
            const pending = total - completed;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-pending').innerText = pending;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            const search = document.getElementById('search-input').value.toLowerCase();

            let filtered = allItems.filter(item => {
                const matchesFilter = currentFilter === 'all' || 
                    (currentFilter === 'completed' && item.completed) || 
                    (currentFilter === 'pending' && !item.completed);
                const matchesSearch = item.title.toLowerCase().includes(search) || 
                    (item.description && item.description.toLowerCase().includes(search));
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <h3>No Items Found</h3>
                        <p>Start by creating a new item using the form on the left.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="item-card">
                    <div class="item-left">
                        <button class="item-checkbox-btn" onclick="toggleItem(${item.id}, ${!item.completed})">
                            <span class="checkmark" style="${item.completed ? 'background: var(--accent-success); border-color: var(--accent-success);' : ''}">
                                <i class="fa-solid fa-check" style="${item.completed ? 'display: block;' : ''}"></i>
                            </span>
                        </button>
                        <div>
                            <div class="item-title ${item.completed ? 'completed' : ''}">${escapeHtml(item.title)}</div>
                            ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="editItem(${item.id})" title="Edit Item"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-icon delete" onclick="deleteItem(${item.id})" title="Delete Item"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('item-id').value;
            const title = document.getElementById('input-title').value;
            const description = document.getElementById('input-desc').value;
            const completed = document.getElementById('input-completed').checked;

            const payload = { title, description, completed };

            try {
                let res;
                if (id) {
                    res = await fetch(`/items/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/items/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                if (!res.ok) throw new Error('Action failed');
                
                showToast(id ? 'Item updated successfully!' : 'Item created successfully!', 'success');
                resetForm();
                fetchItems();
            } catch (err) {
                showToast('Operation failed', 'danger');
            }
        });

        async function toggleItem(id, completed) {
            try {
                const res = await fetch(`/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });
                if (!res.ok) throw new Error('Failed to update status');
                fetchItems();
            } catch (err) {
                showToast('Failed to update item status', 'danger');
            }
        }

        function editItem(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('item-id').value = item.id;
            document.getElementById('input-title').value = item.title;
            document.getElementById('input-desc').value = item.description || '';
            document.getElementById('input-completed').checked = item.completed;
            document.getElementById('btn-save-text').innerText = 'Update Item';
            document.getElementById('form-title-text').innerHTML = `<i class="fa-solid fa-pen-to-square" style="color: var(--accent-primary)"></i> <span>Edit Item #${item.id}</span>`;
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            try {
                const res = await fetch(`/items/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete');
                showToast('Item deleted successfully', 'info');
                fetchItems();
            } catch (err) {
                showToast('Failed to delete item', 'danger');
            }
        }

        function resetForm() {
            document.getElementById('item-id').value = '';
            document.getElementById('item-form').reset();
            document.getElementById('btn-save-text').innerText = 'Save Item';
            document.getElementById('form-title-text').innerHTML = `<i class="fa-solid fa-plus-circle" style="color: var(--accent-primary)"></i> <span>Add New Item</span>`;
        }

        function escapeHtml(text) {
            return text.replace(/[&<"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '"': '&quot;', "'": '&#039;' }[m];
            });
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'danger' ? '#ef4444' : type === 'info' ? '#3b82f6' : '#10b981';
            toast.innerHTML = `<i class="fa-solid ${type === 'danger' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        fetchItems();
    </script>
</body>
</html>
