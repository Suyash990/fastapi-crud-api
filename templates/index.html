<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Futuristic Task & Management Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #07090e;
            --bg-card: rgba(15, 23, 42, 0.65);
            --bg-card-hover: rgba(30, 41, 59, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(6, 182, 212, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --cyan-primary: #06b6d4;
            --violet-primary: #8b5cf6;
            --pink-primary: #ec4899;
            --emerald-primary: #10b981;
            --amber-primary: #f59e0b;
            
            --gradient-main: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            --shadow-neon: 0 0 30px rgba(6, 182, 212, 0.25);
            --radius-xl: 20px;
            --radius-lg: 14px;
            --radius-md: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 10% 10%, rgba(6, 182, 212, 0.12) 0px, transparent 40%),
                radial-gradient(at 90% 20%, rgba(139, 92, 246, 0.15) 0px, transparent 40%),
                radial-gradient(at 50% 80%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        .navbar {
            background: rgba(7, 9, 14, 0.75); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding: 1.1rem 2.5rem;
        }

        .nav-container { max-width: 1320px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 0.85rem; text-decoration: none; color: var(--text-primary); font-weight: 800; font-size: 1.5rem; }
        .brand-logo { width: 44px; height: 44px; background: var(--gradient-main); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; box-shadow: var(--shadow-neon); font-size: 1.2rem; }
        .brand-text { background: linear-gradient(to right, #ffffff, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-actions { display: flex; align-items: center; gap: 1.25rem; }
        .status-badge { background: rgba(16, 185, 129, 0.1); color: var(--emerald-primary); border: 1px solid rgba(16, 185, 129, 0.3); padding: 0.4rem 1rem; border-radius: 30px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem; }
        .status-pulse { width: 8px; height: 8px; background: var(--emerald-primary); border-radius: 50%; box-shadow: 0 0 10px var(--emerald-primary); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .btn-docs { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem 1.2rem; border-radius: var(--radius-lg); font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.3s ease; display: flex; align-items: center; gap: 0.6rem; }
        .btn-docs:hover { border-color: var(--cyan-primary); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); transform: translateY(-2px); }

        .main-content { max-width: 1320px; margin: 0 auto; padding: 2.5rem; flex: 1; width: 100%; }
        .dashboard-header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem; }
        .dashboard-title { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.4rem; }
        .dashboard-subtitle { color: var(--text-secondary); font-size: 1.05rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.75rem; margin-bottom: 3rem; }
        .stat-card { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 1.75rem; display: flex; align-items: center; gap: 1.5rem; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        .stat-card.cyan::before { background: var(--cyan-primary); }
        .stat-card.emerald::before { background: var(--emerald-primary); }
        .stat-card.amber::before { background: var(--amber-primary); }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.18); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); }

        .stat-icon { width: 60px; height: 60px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .stat-icon.cyan { background: rgba(6, 182, 212, 0.12); color: var(--cyan-primary); }
        .stat-icon.emerald { background: rgba(16, 185, 129, 0.12); color: var(--emerald-primary); }
        .stat-icon.amber { background: rgba(245, 158, 11, 0.12); color: var(--amber-primary); }
        .stat-info .stat-value { font-size: 2rem; font-weight: 800; color: var(--text-primary); line-height: 1.1; }
        .stat-info .stat-label { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.2rem; }

        .content-grid { display: grid; grid-template-columns: 380px 1fr; gap: 2rem; }
        @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } }

        .card { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-header { margin-bottom: 1.75rem; }
        .card-title { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.88rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.6rem; }
        .form-input, .form-textarea { width: 100%; background: rgba(7, 9, 14, 0.7); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 0.85rem 1.1rem; color: var(--text-primary); font-size: 0.95rem; outline: none; transition: all 0.25s ease; }
        .form-input:focus, .form-textarea:focus { border-color: var(--cyan-primary); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2); background: rgba(7, 9, 14, 0.9); }
        .form-textarea { resize: vertical; min-height: 100px; }

        .form-checkbox { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; }
        .form-checkbox input { display: none; }
        .checkmark { width: 22px; height: 22px; background: rgba(7, 9, 14, 0.7); border: 1px solid var(--border-color); border-radius: 7px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .form-checkbox input:checked ~ .checkmark { background: var(--cyan-primary); border-color: var(--cyan-primary); box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }
        .checkmark i { color: white; font-size: 0.8rem; display: none; }
        .form-checkbox input:checked ~ .checkmark i { display: block; }

        .btn-submit { width: 100%; background: var(--gradient-main); border: none; color: white; padding: 0.95rem; border-radius: var(--radius-lg); font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: var(--shadow-neon); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
        .btn-submit:hover { opacity: 0.95; transform: translateY(-2px); box-shadow: 0 0 35px rgba(6, 182, 212, 0.4); }

        .directory-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.25rem; margin-bottom: 1.75rem; }
        .filter-buttons { display: flex; background: rgba(7, 9, 14, 0.7); border: 1px solid var(--border-color); padding: 5px; border-radius: var(--radius-lg); }
        .filter-btn { background: transparent; border: none; color: var(--text-secondary); padding: 0.5rem 1.1rem; border-radius: var(--radius-md); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .filter-btn.active { background: var(--cyan-primary); color: white; box-shadow: 0 0 12px rgba(6, 182, 212, 0.3); }

        .search-box { position: relative; min-width: 260px; }
        .search-box i { position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; background: rgba(7, 9, 14, 0.7); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 0.6rem 1.1rem 0.6rem 2.7rem; color: var(--text-primary); font-size: 0.9rem; outline: none; }
        .search-input:focus { border-color: var(--cyan-primary); }

        .items-list { display: flex; flex-direction: column; gap: 1rem; }
        .item-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.35rem; display: flex; align-items: center; justify-content: space-between; gap: 1.25rem; transition: all 0.25s ease; }
        .item-card:hover { border-color: rgba(6, 182, 212, 0.3); background: var(--bg-card-hover); transform: translateX(3px); }
        .item-left { display: flex; align-items: flex-start; gap: 1.1rem; }
        .item-checkbox-btn { background: transparent; border: none; cursor: pointer; margin-top: 3px; }
        .item-title { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.3rem; }
        .item-title.completed { text-decoration: line-through; color: var(--text-muted); }
        .item-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.4; }
        .item-actions { display: flex; align-items: center; gap: 0.6rem; }
        .btn-icon { width: 38px; height: 38px; border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); border-color: rgba(255, 255, 255, 0.2); }
        .btn-icon.delete:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1.25rem; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.8; }
        .toast-container { position: fixed; bottom: 2.5rem; right: 2.5rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.85rem; }
        .toast { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-left: 4px solid var(--cyan-primary); color: var(--text-primary); padding: 1.1rem 1.5rem; border-radius: var(--radius-lg); font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 0.85rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand">
                <div class="brand-logo"><i class="fa-solid fa-bolt-lightning"></i></div>
                <span class="brand-text">TaskPulse Hub</span>
            </a>
            <div class="nav-actions">
                <div class="status-badge">
                    <span class="status-pulse"></span>
                    <span>System Online</span>
                </div>
                <a href="/docs" target="_blank" class="btn-docs">
                    <i class="fa-solid fa-code"></i>
                    <span>Swagger Docs</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-header">
            <div>
                <h1 class="dashboard-title">Command & Task Center</h1>
                <p class="dashboard-subtitle">Manage, automate, and organize high-priority database records in real-time.</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card cyan">
                <div class="stat-icon cyan"><i class="fa-solid fa-cubes"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Total Records</div>
                </div>
            </div>
            <div class="stat-card emerald">
                <div class="stat-icon emerald"><i class="fa-solid fa-circle-check"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">Completed Tasks</div>
                </div>
            </div>
            <div class="stat-card amber">
                <div class="stat-icon amber"><i class="fa-solid fa-hourglass-half"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">Pending Action</div>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title" id="form-title-text">
                        <i class="fa-solid fa-plus-circle" style="color: var(--cyan-primary)"></i>
                        <span>Create New Record</span>
                    </h2>
                </div>
                <form id="item-form">
                    <input type="hidden" id="item-id" value="">
                    <div class="form-group">
                        <label class="form-label" for="input-title">Record Title *</label>
                        <input type="text" id="input-title" class="form-input" placeholder="e.g. Deploy FastAPI Service" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="input-desc">Description & Context</label>
                        <textarea id="input-desc" class="form-textarea" placeholder="Provide additional guidelines or requirements..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox" id="input-completed">
                            <span class="checkmark"><i class="fa-solid fa-check"></i></span>
                            <span style="font-size: 0.92rem; font-weight: 500;">Mark as Completed</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-save">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span id="btn-save-text">Save Record</span>
                    </button>
                </form>
            </div>

            <div class="card">
                <div class="directory-header">
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
                        <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
                        <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
                    </div>
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" class="search-input" placeholder="Search items..." oninput="renderItems()">
                    </div>
                </div>

                <div id="items-container" class="items-list"></div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script>
        let allItems = [];
        let currentFilter = 'all';

        async function fetchItems() {
            try {
                const res = await fetch('/items/');
                if (!res.ok) throw new Error('Failed to fetch items');
                allItems = await res.json();
                updateStats();
                renderItems();
            } catch (err) {
                showToast('Error loading records from API', 'danger');
            }
        }

        function updateStats() {
            const total = allItems.length;
            const completed = allItems.filter(i => i.completed).length;
            const pending = total - completed;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-pending').innerText = pending;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            const search = document.getElementById('search-input').value.toLowerCase();

            let filtered = allItems.filter(item => {
                const matchesFilter = currentFilter === 'all' || 
                    (currentFilter === 'completed' && item.completed) || 
                    (currentFilter === 'pending' && !item.completed);
                const matchesSearch = item.title.toLowerCase().includes(search) || 
                    (item.description && item.description.toLowerCase().includes(search));
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-sparkles"></i>
                        <h3 style="color: var(--text-primary); margin-bottom: 0.4rem;">No Records Found</h3>
                        <p>Get started by creating your first entry using the panel on the left.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="item-card">
                    <div class="item-left">
                        <button class="item-checkbox-btn" onclick="toggleItem(${item.id}, ${!item.completed})">
                            <span class="checkmark" style="${item.completed ? 'background: var(--emerald-primary); border-color: var(--emerald-primary); box-shadow: 0 0 10px rgba(16,185,129,0.4);' : ''}">
                                <i class="fa-solid fa-check" style="${item.completed ? 'display: block;' : ''}"></i>
                            </span>
                        </button>
                        <div>
                            <div class="item-title ${item.completed ? 'completed' : ''}">${escapeHtml(item.title)}</div>
                            ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="editItem(${item.id})" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-icon delete" onclick="deleteItem(${item.id})" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('item-id').value;
            const title = document.getElementById('input-title').value;
            const description = document.getElementById('input-desc').value;
            const completed = document.getElementById('input-completed').checked;

            const payload = { title, description, completed };

            try {
                let res;
                if (id) {
                    res = await fetch(`/items/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/items/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                if (!res.ok) throw new Error('Action failed');
                
                showToast(id ? 'Record updated successfully!' : 'Record created successfully!', 'success');
                resetForm();
                fetchItems();
            } catch (err) {
                showToast('Operation failed', 'danger');
            }
        });

        async function toggleItem(id, completed) {
            try {
                const res = await fetch(`/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });
                if (!res.ok) throw new Error('Failed to update status');
                fetchItems();
            } catch (err) {
                showToast('Failed to update record status', 'danger');
            }
        }

        function editItem(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('item-id').value = item.id;
            document.getElementById('input-title').value = item.title;
            document.getElementById('input-desc').value = item.description || '';
            document.getElementById('input-completed').checked = item.completed;
            document.getElementById('btn-save-text').innerText = 'Update Record';
            document.getElementById('form-title-text').innerHTML = `<i class="fa-solid fa-pen-to-square" style="color: var(--cyan-primary)"></i> <span>Edit Record #${item.id}</span>`;
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            try {
                const res = await fetch(`/items/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete');
                showToast('Record deleted successfully', 'info');
                fetchItems();
            } catch (err) {
                showToast('Failed to delete record', 'danger');
            }
        }

        function resetForm() {
            document.getElementById('item-id').value = '';
            document.getElementById('item-form').reset();
            document.getElementById('btn-save-text').innerText = 'Save Record';
            document.getElementById('form-title-text').innerHTML = `<i class="fa-solid fa-plus-circle" style="color: var(--cyan-primary)"></i> <span>Create New Record</span>`;
        }

        function escapeHtml(text) {
            return text.replace(/[&<"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '"': '&quot;', "'": '&#039;' }[m];
            });
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'danger' ? '#ef4444' : type === 'info' ? '#3b82f6' : '#10b981';
            toast.innerHTML = `<i class="fa-solid ${type === 'danger' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        fetchItems();
    </script>
</body>
</html>
